<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-header">
      <h2 class="heading">Create Account</h2>
      <p class="subheading">Join ShopHub today</p>
    </div>

    <form [formGroup]="registrationForm" (ngSubmit)="register()">

      <div class="input-group">
        <label class="label">Full Name</label>
        <div class="input-wrap">
          <input class="input" type="text" placeholder="John Doe" formControlName="name">
          <small class="error"
          *ngIf="registrationForm.get('name')?.touched && registrationForm.get('name')?.invalid"
          >Name must be atleast 2 characters</small>
        </div>
      </div>

      <div class="input-group">
        <label class="label">Email</label>
        <div class="input-wrap">
          <input class="input" type="email" placeholder="you@example.com" formControlName="email" style="padding-right: 38px">
          <span class="input-icon">
            <!-- email svg icon here -->
          </span>
          <small class="error"
          *ngIf="registrationForm.get('email')?.touched && registrationForm.get('email')?.invalid"
                    
          >Please enter a valid email address</small>
        </div>
      </div>

      <div class="input-group">
        <label class="label">Password</label>
        <div class="input-wrap">
          <input class="input" type="password" placeholder="Min 6 characters" formControlName="password" style="padding-right: 38px">
          <button class="pw-toggle" type="button" > 
            <!-- (click)="togglePw('password')" -->
            <!-- eye icon svg -->
          </button>
          <small class="error"
          *ngIf="registrationForm.get('password')?.touched && registrationForm.get('password')?.invalid"
          >Password must be atleast 8 characters</small>
        </div>
        <!-- <div class="strength-bar">
          <span [class.active]="strength >= 1"></span>
          <span [class.active]="strength >= 2"></span>
          <span [class.active]="strength >= 3"></span>
          <span [class.active]="strength >= 4"></span>
        </div> -->
      </div>

      <div class="input-group">
        <label class="label">Confirm Password</label>
        <div class="input-wrap">
          <input class="input" type="password" placeholder="••••••••" formControlName="confirmPassword" style="padding-right: 38px">
          <!-- <button class="pw-toggle" type="button" (click)="togglePw('confirmPassword')"> -->
            <!-- eye icon svg -->
          <!-- </button> -->
           <small class="error"
          *ngIf="registrationForm.get('confirmPassword')?.touched && registrationForm.get('confirmPassword')?.errors?.['passwordMismatch']"
          >Passwords are not matching</small>
        </div>
      </div>

      <button class="btn btn-primary btn-full" type="submit" [disabled]="registrationForm.invalid">Create Account</button>

    </form>

    <p class="auth-footer text-muted">
      Already have an account? <a class="link" routerLink="/login">Sign in</a>
    </p>

  </div>
</div>
