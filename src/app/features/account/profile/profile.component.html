<div class="page">
  <div class="profile-layout">

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="avatar-block" *ngIf="profile$ | async as user">
        <div class="avatar">{{ user.name | slice:0:1 | uppercase }}</div>
        <div class="av-name">{{ user.name }}</div>
        <div class="av-email">{{ user.email }}</div>
      </div>

      <a class="nav-item" routerLink="/account/edit" routerLinkActive="active">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        Edit Profile
      </a>
      <a class="nav-item" routerLink="/profile/change-password" routerLinkActive="active">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        Change Password
      </a>
      <a class="nav-item" routerLink="/profile/addresses" routerLinkActive="active">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
        My Addresses
      </a>
      <a class="nav-item" routerLink="/orders" routerLinkActive="active">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 0 1-8 0"/>
        </svg>
        My Orders
      </a>

      <hr class="nav-divider">

      <div class="nav-item danger" (click)="logout()">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Logout
      </div>
    </div>

    <!-- Routed content -->
    <div class="content">
      <router-outlet></router-outlet>
    </div>

  </div>
</div>
