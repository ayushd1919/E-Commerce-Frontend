<div class="filter-panel">
  <div class="fp-head">
    <span class="fp-title">Filters</span>
    <button class="clear-btn" (click)="clearAll()">Clear all</button>
  </div>

  <!-- Type -->
  <div class="fp-section">
    <div class="fp-label">Type</div>
    <select class="fp-select" [formControl]="typeControl">
      <option value="" disabled>Select Type</option>
      <option *ngFor="let type of type$ | async" [value]="type.id">{{ type.name }}</option>
    </select>
  </div>

  <!-- Category -->
  <div class="fp-section" *ngIf="category$">
    <div class="fp-label">Category</div>
    <select class="fp-select" [formControl]="categoryControl">
      <option value="" disabled>Select Category</option>
      <option *ngFor="let cat of category$ | async" [value]="cat.id">{{ cat.name }}</option>
    </select>
  </div>

  <!-- Sub-Category -->
  <div class="fp-section" *ngIf="subCategory$">
    <div class="fp-label">Sub-Category</div>
    <select class="fp-select" [formControl]="subCategoryControl">
      <option value="" disabled>Select Sub-Category</option>
      <option *ngFor="let sub of subCategory$ | async" [value]="sub.id">{{ sub.name }}</option>
    </select>
  </div>

  <!-- Price Range -->
  <div class="fp-section">
    <div class="fp-label">Price Range</div>
    <div class="price-inputs">
      <input class="price-inp" type="number" placeholder="Min ₹" [formControl]="minPriceControl">
      <input class="price-inp" type="number" placeholder="Max ₹" [formControl]="maxPriceControl">
    </div>
    <button class="apply-btn" (click)="applyPrice()">Apply</button>
  </div>

</div>
