<div
  class="slider-shell"
  (mouseenter)="stopAutoSlide()"
  (mouseleave)="startAutoSlide()"
>
  <div
    class="slider-track"
    [style.transform]="'translateX(-' + currentIndex * 100 + '%)'"
  >
    <div class="slide" *ngFor="let slide of slides">
      <div class="slide-left" [style.background]="slide.leftBg">
        <div class="badge">{{ slide.badge }}</div>
        <h2>{{ slide.title }}</h2>
        <p class="subtitle">{{ slide.subtitle }}</p>
        <p class="offer">{{ slide.offer }}</p>
        <button class="cta-btn">{{ slide.buttonText }}</button>
      </div>

      <div class="slide-right" [style.background]="slide.rightBg">
        <div class="circle-bg"></div>
        <img [src]="slide.image" [alt]="slide.title" />
      </div>
    </div>
  </div>

  <button class="nav-btn prev" (click)="prevSlide()" aria-label="Previous slide">
    &#10094;
  </button>

  <button class="nav-btn next" (click)="nextSlide()" aria-label="Next slide">
    &#10095;
  </button>

  <div class="dots">
    <button
      *ngFor="let slide of slides; let i = index"
      class="dot"
      [class.active]="i === currentIndex"
      (click)="goToSlide(i)"
      [attr.aria-label]="'Go to slide ' + (i + 1)"
    ></button>
  </div>
</div>
