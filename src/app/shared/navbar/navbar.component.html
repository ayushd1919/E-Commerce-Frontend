<nav class="navbar">
  <a class="nav-logo" routerLink="/">Ayushhh<span>Cart</span></a>

  <div class="nav-search">
    <input
      type="text"
      placeholder="Search for products, brands and more..."
      [(ngModel)]="searchQuery"
      (keyup.enter)="onSearch()">
    <button (click)="onSearch()">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#fff" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
    </button>
  </div>

  <div class="nav-actions">
    <ng-container *ngIf="currentUser$ | async as user; else loggedOut">
      <div class="nav-avatar" [routerLink]="['/account/profile']">
        {{ user?.name | slice:0:1 | uppercase }}
      </div>
      
    </ng-container>

    <ng-template #loggedOut>
      <a class="nav-link" routerLink="/auth/login">Sign In</a>
      <a class="nav-link" routerLink="/auth/register">Register</a>
    </ng-template>

    <a class="nav-cart" routerLink="/cart">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#fff" stroke-width="2">
        <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 0 1-8 0"/>
      </svg>
      <span class="cart-badge"></span>
       <!-- *ngIf="cartCount > 0">{{ cartCount }} -->
    </a>
  </div>
</nav>

<div class="cat-bar">
    <a class="cat-item" routerLink="/home" routerLinkActive="active">All</a>
  <a class="cat-item"
    *ngFor="let type of type$ | async"
    >
    <!-- [routerLink]="['/browse', type.slug]"
    [class.active]="activeType === type.id" -->
    {{ type.name }}
  </a>
</div>
