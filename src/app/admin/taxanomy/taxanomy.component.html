<div class="page-head">
  <div>
    <h1 class="page-title">Taxonomy</h1>
    <div class="page-sub">Manage Type → Category → Sub-Category hierarchy</div>
  </div>
</div>

<div class="tax-layout">

  <!-- Types -->
  <div class="tax-card">
    <div class="tax-head">
      <div class="tax-title">Types</div>
      <button class="tax-add" type="button" (click)="openTypeForm()">+ Add</button>
    </div>

    <div class="tax-item" *ngFor="let t of types$ | async">
      <div>
        <div class="tax-name">{{ t.name }}</div>
        <!-- <div class="tax-sub">{{ t.category || 0 }} categories</div> -->
      </div>
      <div class="acts">
        <button class="act-btn" type="button" (click)="openTypeForm(t)">
          <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"></path>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Categories -->
  <div class="tax-card">
    <div class="tax-head">
      <div class="tax-title">Categories</div>
      <button class="tax-add" type="button" (click)="openCategoryForm()">+ Add</button>
    </div>

    <div class="tax-item" *ngFor="let c of categories$ | async">
      <div>
        <div class="tax-name">{{ c.name }}</div>
        <div class="tax-sub">Type: {{ c.type.name || '-' }}</div>
      </div>
      <div class="acts">
        <button class="act-btn" type="button" (click)="openCategoryForm(c)">
          <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"></path>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Sub-Categories -->
  <div class="tax-card">
    <div class="tax-head">
      <div class="tax-title">Sub-Categories</div>
      <button class="tax-add" type="button" (click)="openSubCategoryForm()">+ Add</button>
    </div>

    <div class="tax-item" *ngFor="let s of subCategories$ | async">
      <div>
        <div class="tax-name">{{ s.name }}</div>
        <div class="tax-sub">Category: {{ s.category.name || '-' }}</div>
      </div>
      <div class="acts">
        <button class="act-btn" type="button" (click)="openSubCategoryForm(s)">
          <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"></path>
          </svg>
        </button>
      </div>
    </div>
  </div>

</div>

<!-- Modal -->
<div class="modal-overlay" *ngIf="showTaxForm" (click)="closeTaxForm()">
  <div class="modal modal-sm" (click)="$event.stopPropagation()">
    <div class="modal-head">
      <div class="modal-title">{{ taxFormTitle }}</div>
      <button class="modal-close" type="button" (click)="closeTaxForm()">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <div class="modal-body">
      <div class="fg">
        <label class="lbl">Name</label>
        <input
          class="inp"
          type="text"
          [(ngModel)]="taxFormName"
          placeholder="Enter name"
        />
      </div>

      <!-- For Category -->
      <div class="fg" *ngIf="taxFormMode === 'category'">
        <label class="lbl">Type</label>
        <select class="inp" [(ngModel)]="taxFormParentId">
          <option [ngValue]="null">Select Type</option>
          <option *ngFor="let t of types$ | async" [ngValue]="t.id">{{ t.name }}</option>
        </select>
      </div>

      <!-- For Sub-Category -->
      <div class="fg" *ngIf="taxFormMode === 'subCategory'">
        <label class="lbl">Category</label>
        <select class="inp" [(ngModel)]="taxFormParentId">
          <option [ngValue]="null">Select Category</option>
          <option *ngFor="let c of categories$ | async" [ngValue]="c.id">{{ c.name }}</option>
        </select>
      </div>
    </div>

    <div class="modal-foot">
      <button class="btn-ghost" type="button" (click)="closeTaxForm()">Cancel</button>
      <button
        class="btn-primary"
        type="button"
        (click)="saveTaxItem()"
        [disabled]="
          !taxFormName.trim() ||
          ((taxFormMode === 'category' || taxFormMode === 'subCategory') && !taxFormParentId)
        "
      >
        {{ taxEditingId ? 'Update' : 'Create' }}
      </button>
    </div>
  </div>
</div>
